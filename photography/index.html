<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Photography - Gabriele Fusar Bassini</title>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <div class="custom-cursor"></div>
    <div class="top-bar">
        <a href="../" class="breadcrumb-link interactable">gabrielefusarbassini</a><span
            class="breadcrumb-active">/photography</span>
    </div>

    <div class="container">
        <div class="left">
            <div class="header initial-hidden" id="main-header">
                <span>PHOTOGRAPHY</span>
                <img src="../media/ball.webp" alt="logo" class="logo">
                <div class="burger" id="burger"><span></span><span></span><span></span></div>
            </div>
            <div class="page-content">
                <div class="project-item initial-hidden">
                    <a href="events" class="img-block interactable initial-hidden">
                        <div class="work-thumb">
                            <img src="events/big/events-bg.jpg" alt="Events">
                        </div>
                    </a>
                    <div class="caption">
                        EVENTS
                        <img src="../media/ball.webp" class="logo" alt="logo">
                        <span class="client">PHOTOGRAPHY</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="middle">
            <div class="project-item initial-hidden">
                <a href="portraits" class="img-block interactable initial-hidden">
                    <div class="work-thumb">
                        <img src="portraits/big/portraits-bg.jpg" alt="Portraits">
                    </div>
                </a>
                <div class="caption">
                    PORTRAITS
                    <img src="../media/ball.webp" class="logo" alt="logo">
                    <span class="client">PHOTOGRAPHY</span>
                </div>
            </div>

            <div class="project-item initial-hidden">
                <a href="landscapes" class="img-block interactable initial-hidden">
                    <div class="work-thumb">
                        <img src="landscapes/big/landscapes-bg.jpg" alt="Landscapes">
                    </div>
                </a>
                <div class="caption">
                    LANDSCAPES
                    <img src="../media/ball.webp" class="logo" alt="logo">
                    <span class="client">PHOTOGRAPHY</span>
                </div>
            </div>
        </div>

        <div class="right-menu-panel" id="menu-container"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="../js/global.js"></script>
</body>

</html>
