<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mograph - Gabriele Fusar Bassini</title>
    <link rel="icon" type="image/webp" href="../media/ball-icon.webp">
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <div class="custom-cursor"></div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <a href="../" class="breadcrumb-link interactable">gabrielefusarbassini</a><span
            class="breadcrumb-active">/mograph</span>
    </div>

    <!-- CONTENT -->
    <div class="container">
        <div class="works-wrapper" style="width: 100%;">
            <div class="header initial-hidden" id="main-header">
                <span>MOTION GRAPHICS</span>
                <div class="burger" id="burger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </div>

    <div class="mograph-container">
        <!-- Main Player -->
        <div class="mograph-main initial-hidden">
            <div class="main-player-wrapper">
                <div class="hover-video">
                    <iframe id="main-video-frame" src="https://www.youtube.com/embed/XQc4ndjK-Wc"
                        allowfullscreen></iframe>
                </div>
            </div>
            <div class="main-video-info">
                <h2 id="main-video-title" class="mograph-title">CHAMPIONS OF PROGRESS</h2>
                <p id="main-video-desc" class="mograph-desc">Video made for a project of the 9th Systemic Sclerosis World Congress.</p>
            </div>
        </div>

        <!-- Sidebar List -->
        <div class="mograph-sidebar initial-hidden">
            <div class="sidebar-header">ALL PROJECTS</div>
            <div class="sidebar-list">
                <!-- Project 1 -->
                <div class="sidebar-item active interactable" data-video-id="XQc4ndjK-Wc"
                    data-title="CHAMPIONS OF PROGRESS"
                    data-desc="Video made for a project of the 9th Systemic Sclerosis World Congress.">
                    <div class="sidebar-thumb">
                        <img src="https://img.youtube.com/vi/XQc4ndjK-Wc/mqdefault.jpg" alt="9th Systemic Sclerosis World Congress">
                    </div>
                    <div class="sidebar-info">
                        <div class="sidebar-title">CHAMPIONS OF PROGRESS</div>
                    </div>
                </div>

                <!-- Project 2 -->
                <div class="sidebar-item interactable" data-video-id="OxdTUQn4xkc" data-title="TEDx 2023 INTRO"
                    data-desc="Introspective and dynamic intro for TEDx 2023.">
                    <div class="sidebar-thumb">
                        <img src="https://img.youtube.com/vi/OxdTUQn4xkc/mqdefault.jpg" alt="TEDx 2023">
                    </div>
                    <div class="sidebar-info">
                        <div class="sidebar-title">TEDx 2023 INTRO</div>
                    </div>
                </div>

                <!-- Project 3 -->
                <div class="sidebar-item interactable" data-video-id="I7Pzp5dfIac" data-title="PLANCKS 2023"
                    data-desc="Visual identity and motion for PLANCKS 2023 physics competition.">
                    <div class="sidebar-thumb">
                        <img src="https://img.youtube.com/vi/I7Pzp5dfIac/mqdefault.jpg" alt="Plancks">
                    </div>
                    <div class="sidebar-info">
                        <div class="sidebar-title">PLANCKS 2023</div>
                    </div>
                </div>

                <!-- Project 4 -->
                <div class="sidebar-item interactable" data-video-id="C_h6_AcV5YA" data-title="HOMNIA"
                    data-desc="Motion design for the Homnia intro sequence.">
                    <div class="sidebar-thumb">
                        <img src="https://img.youtube.com/vi/C_h6_AcV5YA/mqdefault.jpg" alt="Homnia">
                    </div>
                    <div class="sidebar-info">
                        <div class="sidebar-title">HOMNIA</div>
                    </div>
                </div>

                <!-- Project 5 -->
                <div class="sidebar-item interactable" data-video-id="Cz8VWDZclF0"
                    data-title="CONGRESSO NAZIONALE FORENSE"
                    data-desc="Motion graphics intro for the National Forensic Congress.">
                    <div class="sidebar-thumb">
                        <img src="https://img.youtube.com/vi/Cz8VWDZclF0/mqdefault.jpg" alt="Forense">
                    </div>
                    <div class="sidebar-info">
                        <div class="sidebar-title">CONGRESSO NAZIONALE FORENSE</div>
                    </div>
                </div>

                <!-- Project 6 -->
                <div class="sidebar-item interactable" data-video-id="9WYwAA6ITko" data-title="TEDx 2022 INTRO"
                    data-desc="High-impact motion design for TEDx 2022 opening sequence.">
                    <div class="sidebar-thumb">
                        <img src="https://img.youtube.com/vi/9WYwAA6ITko/mqdefault.jpg" alt="TEDx 2022">
                    </div>
                    <div class="sidebar-info">
                        <div class="sidebar-title">TEDx 2022 INTRO</div>
                    </div>
                </div>

                <!-- Project 7 -->
                <div class="sidebar-item interactable" data-video-id="YekEmMDH1bQ" data-title="TEDx 2023 WALK IN INTRO"
                    data-desc="Stage visuals at TEDx 2023.">
                    <div class="sidebar-thumb">
                        <img src="https://img.youtube.com/vi/YekEmMDH1bQ/mqdefault.jpg" alt="Piqued">
                    </div>
                    <div class="sidebar-info">
                        <div class="sidebar-title">TEDx 2023 WALK IN INTRO</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="right-menu-panel" id="menu-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebarItems = document.querySelectorAll('.sidebar-item');
            const mainVideo = document.getElementById('main-video-frame');
            const mainTitle = document.getElementById('main-video-title');
            const mainClient = document.getElementById('main-video-client');
            const mainDesc = document.getElementById('main-video-desc');

            sidebarItems.forEach(item => {
                item.addEventListener('click', () => {
                    // Update Active Class
                    sidebarItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');

                    // Update Main Player
                    const videoId = item.getAttribute('data-video-id');
                    const title = item.getAttribute('data-title');
                    const desc = item.getAttribute('data-desc');

                    mainVideo.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                    mainTitle.innerText = title;
                    mainDesc.innerText = desc;

                    // Scroll to top on mobile
                    if (window.innerWidth <= 1024) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            });
        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="../js/global.js"></script>
</body>

</html>
