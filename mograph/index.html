<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mograph - Gabriele Fusar Bassini</title>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <div class="custom-cursor"></div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <a href="../" class="breadcrumb-link interactable">gabrielefusarbassini</a><span
            class="breadcrumb-active">/mograph</span>
    </div>

    <!-- CONTENT -->
    <div class="mograph-reel-container" id="reel-scroller">
        <!-- Project 1 -->
        <div class="mograph-card">
            <div class="mograph-bg-text">FORENSE</div>
            <div class="mograph-video-wrapper">
                <div class="hover-video">
                    <iframe src="https://www.youtube.com/embed/Cz8VWDZclF0" allowfullscreen></iframe>
                </div>
            </div>
            <div class="mograph-info">
                <h2 class="mograph-title">CONGRESSO FORENSE</h2>
                <span class="mograph-client">MOTION GRAPHICS</span>
            </div>
        </div>

        <!-- Project 2 -->
        <div class="mograph-card">
            <div class="mograph-bg-text">TEDx 2023</div>
            <div class="mograph-video-wrapper">
                <div class="hover-video">
                    <iframe src="https://www.youtube.com/embed/OxdTUQn4xkc" allowfullscreen></iframe>
                </div>
            </div>
            <div class="mograph-info">
                <h2 class="mograph-title">TEDx 2023 INTRO</h2>
                <span class="mograph-client">MOTION DESIGN</span>
            </div>
        </div>

        <!-- Project 3 -->
        <div class="mograph-card">
            <div class="mograph-bg-text">PLANCKS</div>
            <div class="mograph-video-wrapper">
                <div class="hover-video">
                    <iframe src="https://www.youtube.com/embed/I7Pzp5dfIac" allowfullscreen></iframe>
                </div>
            </div>
            <div class="mograph-info">
                <h2 class="mograph-title">PLANCKS 2023</h2>
                <span class="mograph-client">VISUAL DESIGN</span>
            </div>
        </div>

        <!-- Project 4 -->
        <div class="mograph-card">
            <div class="mograph-bg-text">HOMNIA</div>
            <div class="mograph-video-wrapper">
                <div class="hover-video">
                    <iframe src="https://www.youtube.com/embed/C_h6_AcV5YA" allowfullscreen></iframe>
                </div>
            </div>
            <div class="mograph-info">
                <h2 class="mograph-title">HOMNIA INTRO</h2>
                <span class="mograph-client">CGI & MOTION</span>
            </div>
        </div>

        <!-- Project 5 -->
        <div class="mograph-card">
            <div class="mograph-bg-text">TEDx 2022</div>
            <div class="mograph-video-wrapper">
                <div class="hover-video">
                    <iframe src="https://www.youtube.com/embed/9WYwAA6ITko" allowfullscreen></iframe>
                </div>
            </div>
            <div class="mograph-info">
                <h2 class="mograph-title">TEDx 2022 INTRO</h2>
                <span class="mograph-client">MOTION DESIGN</span>
            </div>
        </div>

        <!-- Project 6 -->
        <div class="mograph-card">
            <div class="mograph-bg-text">PIQUED</div>
            <div class="mograph-video-wrapper">
                <div class="hover-video">
                    <iframe src="https://www.youtube.com/embed/YekEmMDH1bQ" allowfullscreen></iframe>
                </div>
            </div>
            <div class="mograph-info">
                <h2 class="mograph-title">TEDx 2023 PIQUED JACKS</h2>
                <span class="mograph-client">STAGE DESIGN</span>
            </div>
        </div>
    </div>

    <!-- UI ELEMENTS -->
    <div class="mograph-progress">
        <div class="mograph-progress-bar" id="progress-bar"></div>
    </div>
    <div class="mograph-nav-hint">SCROLL TO EXPLORE</div>

    <div class="burger" id="burger" style="position:fixed; top:40px; right:40px; z-index:10002;">
        <span></span><span></span><span></span>
    </div>
    <div class="right-menu-panel" id="menu-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const scroller = document.getElementById('reel-scroller');
            const bar = document.getElementById('progress-bar');

            if (scroller && bar) {
                scroller.addEventListener('scroll', () => {
                    const max = scroller.scrollWidth - scroller.clientWidth;
                    const percent = (scroller.scrollLeft / max) * 100;
                    bar.style.width = percent + '%';
                });

                // Support mousewheel horizontal scroll
                scroller.addEventListener('wheel', (e) => {
                    if (e.deltaY !== 0) {
                        e.preventDefault();
                        scroller.scrollLeft += e.deltaY;
                    }
                });
            }
        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="../js/global.js"></script>
</body>

</html>
