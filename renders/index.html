<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Renders - Gabriele Fusar Bassini</title>
  <link rel="stylesheet" href="../css/global.css">
</head>

<body class="renders-page">
  <div class="custom-cursor"></div>

  <div class="top-bar">
    <a href="../" class="breadcrumb-link interactable">gabrielefusarbassini</a><span
      class="breadcrumb-link">/renders</span>
  </div>

  <div class="container">
    <div class="renders-container">

      <div class="header initial-hidden" id="main-header">
        <span>RENDERS</span>
        <div class="burger" id="burger"><span></span><span></span><span></span></div>
      </div>
      <div class="page-content">
        <div class="renders-showcase grid-layout">
          <div class="render-item initial-hidden" data-speed="0.05">
            <div class="img-block interactable">
              <img src="../media/render-chiesi.webp" alt="Render 1">
            </div>
            <div class="render-meta"><span>01</span><span>Chiesi - Move On</span></div>
          </div>

          <div class="render-item initial-hidden" data-speed="0.12">
            <div class="img-block interactable">
              <img src="../media/render-necchi.webp" alt="Render 2">
            </div>
            <div class="render-meta"><span>02</span><span>Villa Necchi</span></div>
          </div>

          <div class="render-item initial-hidden" data-speed="0.08">
            <div class="img-block interactable">
              <img src="../media/render-ita.webp" alt="Render 3">
            </div>
            <div class="render-meta"><span>03</span><span>ITA</span></div>
          </div>

          <div class="render-item initial-hidden" data-speed="0.15">
            <div class="img-block interactable">
              <img src="../media/render-ses-1.webp" alt="Render 4">
            </div>
            <div class="render-meta"><span>04</span><span>Sport e Salute</span></div>
          </div>

          <div class="render-item initial-hidden" data-speed="0.1">
            <div class="img-block interactable">
              <img src="../media/render-ses-2.webp" alt="Render 5">
            </div>
            <div class="render-meta"><span>05</span><span>Sport e Salute</span></div>
          </div>

          <div class="render-item initial-hidden" data-speed="0.05">
            <div class="img-block interactable">
              <img src="../media/render-ses-3.webp" alt="Render 6">
            </div>
            <div class="render-meta"><span>06</span><span>Sport e Salute</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="right-menu-panel" id="menu-container"></div>
  </div>

  <div id="imageModal">
    <button id="modalClose" class="interactable">✕</button>
    <button id="prevBtn" class="modal-nav interactable">‹</button>
    <button id="nextBtn" class="modal-nav interactable">›</button>
    <img id="modalImg" src="">
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="../js/global.js"></script>


</body>

</html>
